name: OCI Compute Instance Run

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  run-oci-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Build Raw Environment Files
        run: |
          cat << 'EOF' > ./private.pem
          ${{ secrets.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 ./private.pem
          
          cat << 'EOF' > .env
          OCI_REGION="${{ secrets.OCI_REGION }}"
          OCI_USER_ID="${{ secrets.OCI_USER_ID }}"
          OCI_TENANCY_ID="${{ secrets.OCI_TENANCY_ID }}"
          OCI_COMPARTMENT_ID="${{ secrets.OCI_TENANCY_ID }}"
          OCI_KEY_FINGERPRINT="${{ secrets.OCI_KEY_FINGERPRINT }}"
          OCI_PRIVATE_KEY_FILENAME="./private.pem"
          OCI_SUBNET_ID="${{ secrets.OCI_SUBNET_ID }}"
          OCI_IMAGE_ID="${{ secrets.OCI_IMAGE_ID }}"
          OCI_OCPUS="${{ secrets.OCI_OCPUS }}"
          OCI_MEMORY_IN_GBS="${{ secrets.OCI_MEMORY_IN_GBS }}"
          OCI_SHAPE="${{ secrets.OCI_SHAPE }}"
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY }}"
          OCI_AVAILABILITY_DOMAIN="GyQu:ME-JEDDAH-1-AD-1"
          EOF

      - name: Execute API Request
        run: php index.php
